        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

            color: #c9d1d9;
            padding: 12px;
            min-height: 100vh;
            min-height: 100dvh;
            padding-bottom: 80px;
        }
        .install-banner {
            background: linear-gradient(135deg, #1f6feb, #58a6ff);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            color: white;
            font-size: 14px;
        }
        .install-banner.show { display: flex; }
        .install-banner button {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid #30363d;
        }
        .header h1 {
            font-size: 20px;
            color: #58a6ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header .stats {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            font-size: 13px;
            color: #8b949e;
            flex-wrap: wrap;
        }
        .header .stats span {
            background: #21262d;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .search-box {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #30363d;
            background: #161b22;
            color: #c9d1d9;
            font-size: 16px;
            margin-bottom: 12px;
            box-sizing: border-box;
            -webkit-appearance: none;
        }
        .search-box:focus {
            outline: none;
            border-color: #58a6ff;
        }
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .filters button {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #30363d;
            background: #161b22;
            color: #8b949e;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .filters button.active {
            background: #1f6feb;
            color: white;
            border-color: #1f6feb;
        }
        .filters button:active { transform: scale(0.95); }
        .category-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            overflow-x: auto;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
        }
        .category-tabs button {
            padding: 5px 12px;
            border-radius: 16px;
            border: 1px solid #30363d;
            background: #161b22;
            color: #8b949e;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .category-tabs button.active {
            background: #1f6feb;
            color: white;
            border-color: #1f6feb;
        }
        .category-tabs button:active { transform: scale(0.95); }
        .item-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 10px;
            transition: all 0.2s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .item-card:active {
            background: #1c2333;
            transform: scale(0.99);
        }
        .item-title {
            font-size: 15px;
            font-weight: 600;
            color: #f0f6fc;
            margin-bottom: 6px;
            word-break: break-word;
        }
        .item-details {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 16px;
            font-size: 13px;
            color: #8b949e;
        }
        .item-details .buy { color: #f0883e; font-weight: 600; }
        .item-details .sell { color: #3fb950; font-weight: 600; }
        .item-details .roi { color: #58a6ff; font-weight: 600; }
        .item-details .speed {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .speed.Quick { background: #1a3a2a; color: #3fb950; }
        .speed.Medium { background: #3d2a1a; color: #f0883e; }
        .speed.Slow { background: #3a1a1a; color: #f85149; }
        .item-category {
            font-size: 11px;
            color: #58a6ff;
            background: #0d1f3a;
            padding: 2px 10px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 4px;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8b949e;
        }
        .empty-state .big { font-size: 48px; margin-bottom: 12px; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }
        .loading .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer {
            text-align: center;
            padding: 20px;
            color: #484f58;
            font-size: 12px;
        }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #21262d;
            color: #c9d1d9;
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid #30363d;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            z-index: 100;
        }
        .toast.show { opacity: 1; }
        .offline-badge {
            display: none;
            background: #3d1a1a;
            color: #f85149;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid #f85149;
        }
        .offline-badge.show { display: inline-block; }
        .scroll-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1f6feb;
            color: white;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 24px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: 0 4px 16px rgba(31,111,235,0.3);
            z-index: 50;
            -webkit-tap-highlight-color: transparent;
        }
        .scroll-top.show { opacity: 1; }
        .scroll-top:active { transform: scale(0.9); }
    </style>
</head>

    <div class="install-banner" id="installBanner">
        <span>📲 Install this app</span>
        <button id="installBtn">Install</button>
    </div>

    <div class="header">
        <h1>📊 RD Flip <span class="offline-badge" id="offlineBadge">📡 Offline</span></h1>
        <div class="stats">
            <span id="totalItems">📦 Loading...</span>
            <span id="totalCategories">📂 Categories: ...</span>
            <span id="lastUpdated">🔄 Updated: ...</span>
        </div>
    </div>

    <input class="search-box" id="searchInput" type="text" placeholder="🔍 Search items... (e.g. 'hulk', 'berserk')" inputmode="search" autocomplete="off">

    <div class="category-tabs" id="categoryTabs">
        <button class="active" data-category="all">📋 All</button>
    </div>

    <div class="filters" id="filterButtons">
        <button class="active" data-filter="all">All</button>
        <button data-filter="Quick">⚡ Quick</button>
        <button data-filter="Medium">🔄 Medium</button>
        <button data-filter="Slow">🐢 Slow</button>
    </div>

    <div id="itemsContainer">
        <div class="loading">
            <div class="spinner"></div>
            <p style="margin-top:12px;">Loading database...</p>
        </div>
    </div>

    <div class="footer">💡 Tap any item for details • 📱 Install for offline access</div>

    <button class="scroll-top" id="scrollTopBtn" aria-label="Scroll to top">↑</button>
    <div class="toast" id="toast"></div>

    <script>
        // PWA Install
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').classList.add('show');
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const result = await deferredPrompt.userChoice;
                if (result.outcome === 'accepted') {
                    document.getElementById('installBanner').classList.remove('show');
                }
                deferredPrompt = null;
            }
        });

        // Offline Detection
        function updateOnlineStatus() {
            const badge = document.getElementById('offlineBadge');
            if (!navigator.onLine) {
                badge.classList.add('show');
            } else {
                badge.classList.remove('show');
            }
        }
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();

        // ─── APP LOGIC ──────────────────────────────────────────────
        let currentCategory = 'all';
        let currentFilter = 'all';
        let searchTerm = '';
        let filteredItems = [];

        const container = document.getElementById('itemsContainer');
        const searchInput = document.getElementById('searchInput');
        const totalEl = document.getElementById('totalItems');
        const categoriesEl = document.getElementById('totalCategories');
        const updatedEl = document.getElementById('lastUpdated');
        const scrollTopBtn = document.getElementById('scrollTopBtn');

        function getCategories() {
            const cats = new Set();
            ITEMS.forEach(item => cats.add(item.category));
            return Array.from(cats).sort();
        }

        function getSpeedEmoji(speed) {
            if (speed === 'Quick') return '⚡';
            if (speed === 'Medium') return '🔄';
            if (speed === 'Slow') return '🐢';
            return '❓';
        }

        function formatPrice(p) { return '£' + p.toFixed(2); }

        function render() {
            const search = searchTerm.toLowerCase().trim();
            const cat = currentCategory;
            const filter = currentFilter;

            filteredItems = ITEMS.filter(item => {
                if (cat !== 'all' && item.category !== cat) return false;
                if (filter !== 'all' && item.speed !== filter) return false;
                if (search) {
                    return item.item.toLowerCase().includes(search) ||
                           item.category.toLowerCase().includes(search);
                }
                return true;
            });

            totalEl.textContent = `📦 ${filteredItems.length} items`;
            categoriesEl.textContent = `📂 ${getCategories().length} categories`;

            if (filteredItems.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="big">🔍</div>
                        <p>No items found matching your filters</p>
                        <p style="font-size:13px;margin-top:8px;color:#484f58;">
                            Try changing the search or filters above
                        </p>
                    </div>
                `;
                return;
            }

            let html = '';
            filteredItems.forEach(item => {
                const speedEmoji = getSpeedEmoji(item.speed);
                const speedClass = item.speed;
                html += `
                    <div class="item-card" onclick="showToast('${item.item.replace(/'/g, "\\'")} | Buy: £${item.buy} | Sell: £${item.sell_min}-${item.sell_max} | ROI: ${item.roi}')">
                        <div class="item-title">${item.item}</div>
                        <div class="item-details">
                            <span class="buy">💰 Buy: ${formatPrice(item.buy)}</span>
                            <span class="sell">📈 Sell: ${formatPrice(item.sell_min)}-${formatPrice(item.sell_max)}</span>
                            <span class="roi">📊 ROI: ${item.roi}</span>
                            <span class="speed ${speedClass}">${speedEmoji} ${item.speed}</span>
                        </div>
                        <span class="item-category">📂 ${item.category}</span>
                    </div>
                `;
            });

            container.innerHTML = html;
            if (filteredItems.length > 20) {
                scrollTopBtn.classList.add('show');
            } else {
                scrollTopBtn.classList.remove('show');
            }
        }

        let toastTimeout;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        function setupCategories() {
            const tabsContainer = document.getElementById('categoryTabs');
            const categories = getCategories();
            let html = `<button class="active" data-category="all">📋 All</button>`;
            categories.forEach(cat => {
                const emoji = { 'Comics': '💀', 'Manga': '📖', 'Graphic Novel': '📚', 'Blu-ray': '🎬', 'Textbook': '📕', 'Automotive': '🚗', 'Games': '🎮' }[cat] || '📂';
                html += `<button data-category="${cat}">${emoji} ${cat}</button>`;
            });
            tabsContainer.innerHTML = html;
            tabsContainer.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', function() {
                    tabsContainer.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentCategory = this.dataset.category;
                    render();
                });
            });
        }

        function setupFilters() {
            const filters = document.getElementById('filterButtons');
            filters.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', function() {
                    filters.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    render();
                });
            });
        }

        searchInput.addEventListener('input', function() {
            searchTerm = this.value;
            render();
        });

        scrollTopBtn.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        window.addEventListener('scroll', function() {
            if (window.scrollY > 300) {
                scrollTopBtn.classList.add('show');
            } else {
                scrollTopBtn.classList.remove('show');
            }
        });

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('✅ Service Worker registered'))
                .catch(() => console.log('⚠️ Service Worker registration failed'));
        }

        // Init
        updatedEl.textContent = '🔄 ' + new Date().toLocaleDateString('en-GB', {
            day: '2-digit', month: 'short', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });

        setupCategories();
        setupFilters();
        render();
        console.log(`📊 RD Flip PWA loaded with ${ITEMS.length} items`);
    </script>
