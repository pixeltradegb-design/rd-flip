<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#0d1117">
    <title>📊 Price Verifier</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 12px;
            max-width: 800px;
            margin: 0 auto;
            min-height: 100vh;
            min-height: 100dvh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid #30363d;
            text-align: center;
        }
        .header h1 { color: #58a6ff; font-size: 22px; }
        .header .stats { color: #8b949e; font-size: 14px; margin-top: 4px; }
        .header .stats span { 
            background: #21262d; 
            padding: 2px 10px; 
            border-radius: 12px;
            margin: 0 4px;
        }
        .progress {
            background: #161b22;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1px solid #30363d;
        }
        .progress-bar {
            background: #30363d;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            margin-top: 6px;
        }
        .progress-fill {
            background: linear-gradient(90deg, #1f6feb, #58a6ff);
            height: 100%;
            transition: width 0.3s;
            border-radius: 10px;
            text-align: center;
            color: white;
            font-size: 12px;
            line-height: 20px;
            font-weight: 600;
        }
        .item-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .item-title {
            font-size: 16px;
            font-weight: 600;
            color: #f0f6fc;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .item-details {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 12px;
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 10px;
        }
        .item-details .buy { color: #f0883e; font-weight: 600; }
        .item-details .sell { color: #3fb950; font-weight: 600; }
        .item-details .speed { 
            padding: 2px 10px; 
            border-radius: 12px; 
            font-size: 12px; 
            font-weight: 600;
        }
        .speed.Quick { background: #1a3a2a; color: #3fb950; }
        .speed.Medium { background: #3d2a1a; color: #f0883e; }
        .speed.Slow { background: #3a1a1a; color: #f85149; }
        .verify-section {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .verify-section input {
            flex: 1;
            min-width: 100px;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #c9d1d9;
            font-size: 16px;
            -webkit-appearance: none;
        }
        .verify-section input:focus {
            outline: none;
            border-color: #58a6ff;
        }
        .verify-section input::placeholder {
            color: #484f58;
            font-size: 14px;
        }
        .verify-section button {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .verify-section button:active { transform: scale(0.95); }
        .btn-verify { background: #1f6feb; color: white; }
        .btn-verify:hover { background: #58a6ff; }
        .btn-skip { background: #21262d; color: #8b949e; }
        .btn-skip:hover { background: #30363d; }
        .btn-done { background: #3fb950; color: white; }
        .btn-done:hover { background: #4cda64; }
        .quick-links {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .quick-links a {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }
        .btn-ebay {
            background: #1a3a2a;
            color: #3fb950;
            border: 1px solid #3fb950;
        }
        .btn-ebay:hover { background: #3fb950; color: #0d1117; }
        .btn-amazon {
            background: #1a2a3a;
            color: #58a6ff;
            border: 1px solid #58a6ff;
        }
        .btn-amazon:hover { background: #58a6ff; color: #0d1117; }
        .btn-cex {
            background: #3a1a2a;
            color: #f0883e;
            border: 1px solid #f0883e;
        }
        .btn-cex:hover { background: #f0883e; color: #0d1117; }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8b949e;
        }
        .empty-state .big { font-size: 48px; margin-bottom: 12px; }
        .empty-state h2 { color: #f0f6fc; margin-bottom: 8px; }
        .empty-state p { color: #8b949e; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #21262d;
            color: #c9d1d9;
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid #30363d;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
            max-width: 90%;
            text-align: center;
        }
        .toast.show { opacity: 1; }
        .export-section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 16px;
            margin-top: 16px;
            text-align: center;
        }
        .export-section button {
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            background: #1f6feb;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin: 4px;
        }
        .export-section button:hover { background: #58a6ff; }
        .btn-reset {
            background: #3d1a1a !important;
            color: #f85149 !important;
        }
        .btn-reset:hover { background: #f85149 !important; color: #0d1117 !important; }
        .counter {
            font-size: 14px;
            color: #8b949e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .counter .badge {
            background: #21262d;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 12px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }
        .loading .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer {
            text-align: center;
            padding: 20px;
            color: #484f58;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>📊 Price Verifier</h1>
    <div class="stats">
        <span id="totalItems">Loading...</span>
        <span id="categoryCount">Categories: ...</span>
    </div>
</div>

<div class="progress">
    <div class="counter">
        <span id="counter">0 / 0 verified</span>
        <span class="badge" id="speedBadge">⚡ Quick: 0</span>
    </div>
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%">0%</div>
    </div>
</div>

<div id="itemContainer">
    <div class="loading">
        <div class="spinner"></div>
        <p style="margin-top:12px;">Loading items...</p>
    </div>
</div>

<div class="export-section" id="exportSection" style="display:none;">
    <button onclick="exportData()">📥 Download CSV</button>
    <button onclick="exportVerifiedOnly()">⭐ Download Verified Only</button>
    <button class="btn-reset" onclick="resetAll()">🔄 Reset All</button>
    <p style="margin-top:8px;font-size:12px;color:#484f58;">
        💾 Your progress is saved automatically in your browser
    </p>
</div>

<div class="footer">💡 Tap any quick link to search • Progress saved locally</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// DATA
// ============================================================
let verifiedItems = [];
let items = [];

// ============================================================
// LOAD DATA
// ============================================================
async function loadData() {
    try {
        // Load items from JSON
        const response = await fetch('all_items.json');
        items = await response.json();
        
        // Load saved progress from localStorage
        const saved = localStorage.getItem('verifiedItems');
        if (saved) {
            const parsed = JSON.parse(saved);
            // Merge with current items
            verifiedItems = items.map(item => {
                const savedItem = parsed.find(p => p.item === item.item);
                if (savedItem && savedItem.verified) {
                    return {
                        ...item,
                        verified: true,
                        ebay_price: savedItem.ebay_price || null,
                        note: savedItem.note || ''
                    };
                }
                return {
                    ...item,
                    verified: false,
                    ebay_price: null,
                    note: ''
                };
            });
        } else {
            verifiedItems = items.map(item => ({
                ...item,
                verified: false,
                ebay_price: null,
                note: ''
            }));
        }
        
        localStorage.setItem('verifiedItems', JSON.stringify(verifiedItems));
        updateStats();
        render();
        
    } catch (e) {
        console.error('Error:', e);
        document.getElementById('itemContainer').innerHTML = `
            <div class="empty-state">
                <div class="big">⚠️</div>
                <p>Could not load items. Make sure all_items.json exists.</p>
                <p style="font-size:13px;margin-top:8px;color:#484f58;">
                    Run: python3 extract_data.py first
                </p>
            </div>
        `;
    }
}

// ============================================================
// UPDATE STATS
// ============================================================
function updateStats() {
    const total = verifiedItems.length;
    document.getElementById('totalItems').textContent = `📦 ${total} items`;
    
    const categories = new Set(verifiedItems.map(i => i.category));
    document.getElementById('categoryCount').textContent = `📂 ${categories.size} categories`;
    
    const quick = verifiedItems.filter(i => i.speed === 'Quick').length;
    document.getElementById('speedBadge').textContent = `⚡ Quick: ${quick}`;
}

// ============================================================
// RENDER
// ============================================================
function render() {
    const container = document.getElementById('itemContainer');
    
    const unverified = verifiedItems.filter(item => !item.verified);
    
    if (unverified.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="big">🎉</div>
                <h2>All Done!</h2>
                <p>You've verified all ${verifiedItems.length} items!</p>
                <p style="font-size:13px;color:#484f58;margin-top:4px;">
                    Click "Download CSV" to export your verified prices.
                </p>
            </div>
        `;
        document.getElementById('exportSection').style.display = 'block';
        updateProgress();
        return;
    }
    
    document.getElementById('exportSection').style.display = 'block';
    
    const item = unverified[0];
    const total = verifiedItems.length;
    const done = total - unverified.length;
    
    const speedClass = item.speed || 'Slow';
    const emoji = speedClass === 'Quick' ? '⚡' : speedClass === 'Medium' ? '🔄' : '🐢';
    const avgSell = ((item.sell_min + item.sell_max) / 2);
    
    container.innerHTML = `
        <div class="item-card">
            <div class="item-title">${item.item}</div>
            <div class="item-details">
                <span class="buy">💰 Buy (AI): £${item.buy.toFixed(2)}</span>
                <span class="sell">📈 AI Sell: £${item.sell_min.toFixed(2)}-${item.sell_max.toFixed(2)}</span>
                <span class="speed ${speedClass}">${emoji} ${speedClass}</span>
                <span style="color:#484f58;font-size:12px;">📂 ${item.category}</span>
            </div>
            <div class="verify-section">
                <input type="number" id="priceInput" placeholder="Enter eBay sold price" 
                       step="0.01" min="0"
                       onkeydown="if(event.key==='Enter') verify()">
                <button class="btn-verify" onclick="verify()">✅ Verify</button>
                <button class="btn-skip" onclick="skip()">⏭️ Skip</button>
            </div>
            <div class="quick-links">
                <a href="#" class="btn-ebay" onclick="openSearch('ebay','${encodeURIComponent(item.item)}')">🔍 eBay</a>
                <a href="#" class="btn-amazon" onclick="openSearch('amazon','${encodeURIComponent(item.item)}')">🛒 Amazon</a>
                <a href="#" class="btn-cex" onclick="openSearch('cex','${encodeURIComponent(item.item)}')">🔄 CeX</a>
            </div>
            <div style="margin-top:8px;font-size:12px;color:#484f58;">
                ${done + 1} of ${total} | ${Math.round((done/total)*100)}% done
                ${item.verified && item.ebay_price ? `✅ Verified: £${item.ebay_price.toFixed(2)}` : ''}
            </div>
        </div>
    `;
    
    const input = document.getElementById('priceInput');
    if (input) {
        input.focus();
        input.select();
    }
    updateProgress();
}

// ============================================================
// VERIFY / SKIP
// ============================================================
function verify() {
    const input = document.getElementById('priceInput');
    const price = parseFloat(input.value);
    
    if (isNaN(price) || price <= 0) {
        showToast('⚠️ Please enter a valid price');
        input.focus();
        input.select();
        return;
    }
    
    const unverified = verifiedItems.filter(item => !item.verified);
    if (unverified.length === 0) return;
    
    const item = unverified[0];
    const index = verifiedItems.indexOf(item);
    
    verifiedItems[index].verified = true;
    verifiedItems[index].ebay_price = price;
    
    localStorage.setItem('verifiedItems', JSON.stringify(verifiedItems));
    render();
    showToast(`✅ Verified: £${price.toFixed(2)}`);
}

function skip() {
    const unverified = verifiedItems.filter(item => !item.verified);
    if (unverified.length === 0) return;
    
    const item = unverified[0];
    const index = verifiedItems.indexOf(item);
    
    verifiedItems[index].verified = true;
    verifiedItems[index].ebay_price = null;
    verifiedItems[index].note = 'skipped';
    
    localStorage.setItem('verifiedItems', JSON.stringify(verifiedItems));
    render();
    showToast(`⏭️ Skipped`);
}

// ============================================================
// QUICK LINKS
// ============================================================
function openSearch(site, query) {
    const decoded = decodeURIComponent(query);
    let url = '';
    
    switch(site) {
        case 'ebay':
            url = `https://www.ebay.co.uk/sch/i.html?_nkw=${query}&_sop=12&LH_Sold=1&LH_Complete=1`;
            break;
        case 'amazon':
            url = `https://www.amazon.co.uk/s?k=${query}`;
            break;
        case 'cex':
            url = `https://uk.webuy.com/search?stext=${query}`;
            break;
    }
    
    window.open(url, '_blank');
    return false;
}

// ============================================================
// PROGRESS
// ============================================================
function updateProgress() {
    const total = verifiedItems.length;
    const done = verifiedItems.filter(item => item.verified).length;
    const pct = total > 0 ? Math.round((done/total)*100) : 0;
    
    document.getElementById('counter').textContent = `${done} / ${total} verified`;
    document.getElementById('progressFill').style.width = `${pct}%`;
    document.getElementById('progressFill').textContent = `${pct}%`;
}

// ============================================================
// EXPORT
// ============================================================
function exportData() {
    let csv = 'Item,Category,Buy (AI),Sell (AI Min),Sell (AI Max),eBay Sold,ROI%,Speed,Status\n';
    
    verifiedItems.forEach(item => {
        const roi = item.ebay_price ? ((item.ebay_price - item.buy) / item.buy * 100).toFixed(0) : 'N/A';
        const status = item.verified ? (item.ebay_price ? 'Verified' : 'Skipped') : 'Pending';
        csv += `"${item.item}",${item.category},${item.buy},${item.sell_min},${item.sell_max},${item.ebay_price || ''},${roi},${item.speed},${status}\n`;
    });
    
    downloadCSV(csv, 'all_verified_prices.csv');
    showToast(`📥 Downloaded all ${verifiedItems.length} items`);
}

function exportVerifiedOnly() {
    const verified = verifiedItems.filter(item => item.verified && item.ebay_price !== null);
    
    let csv = 'Item,Category,Buy (AI),eBay Sold,ROI%,Speed,Profit\n';
    verified.forEach(item => {
        const roi = ((item.ebay_price - item.buy) / item.buy * 100).toFixed(0);
        const profit = (item.ebay_price - item.buy).toFixed(2);
        csv += `"${item.item}",${item.category},${item.buy},${item.ebay_price},${roi}%,${item.speed},£${profit}\n`;
    });
    
    downloadCSV(csv, 'verified_only.csv');
    showToast(`📥 Downloaded ${verified.length} verified items`);
}

function downloadCSV(csv, filename) {
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

// ============================================================
// RESET
// ============================================================
function resetAll() {
    if (confirm('⚠️ Reset all verification data? This cannot be undone!')) {
        localStorage.removeItem('verifiedItems');
        location.reload();
    }
}

// ============================================================
// TOAST
// ============================================================
let toastTimeout;

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
    }, 2000);
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', function(e) {
    // Ctrl+Enter = Verify, Ctrl+Shift+Enter = Skip
    if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        verify();
    }
    if (e.ctrlKey && e.shiftKey && e.key === 'Enter') {
        e.preventDefault();
        skip();
    }
});

// ============================================================
// INIT
// ============================================================
loadData();
</script>
</body>
</html>
